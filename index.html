<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Blog List Generator</title>
  <style>
    body {
      font-family: Georgia, serif;
      max-width: 800px;
      margin: 60px auto;
      padding: 0 20px;
      background: #fafaf8;
      color: #222;
    }
    h1 { font-size: 1.6rem; margin-bottom: 4px; }
    p.sub { color: #666; margin-top: 0; margin-bottom: 32px; font-size: 0.95rem; }

    label.upload {
      display: inline-block;
      padding: 10px 20px;
      background: #222;
      color: #fff;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.95rem;
    }
    label.upload:hover { background: #444; }
    input[type="file"] { display: none; }

    #status { margin-top: 16px; color: #555; font-size: 0.9rem; min-height: 1.4em; }

    #output-section { display: none; margin-top: 40px; }

    .output-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .output-toolbar h2 { font-size: 1.1rem; margin: 0; }

    .buttons { display: flex; gap: 10px; align-items: center; }
    button {
      padding: 8px 18px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.9rem;
    }
    #btn-copy { background: #222; color: #fff; }
    #btn-copy:hover { background: #444; }
    #copy-confirm { font-size: 0.85rem; color: #2a7a2a; display: none; }

    #utm-section {
      margin-top: 20px;
      font-size: 0.9rem;
    }

    .utm-toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      color: #444;
      user-select: none;
    }

    .utm-toggle input { cursor: pointer; }

    #utm-fields {
      display: none;
      margin-top: 10px;
      display: none;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    #utm-fields.visible { display: flex; }

    #utm-campaign {
      padding: 7px 12px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 0.9rem;
      font-family: Georgia, serif;
      width: 220px;
    }

    #utm-campaign:focus { outline: none; border-color: #888; }

    .utm-preview {
      color: #888;
      font-family: monospace;
      font-size: 0.8rem;
    }

    /* The rendered output area */
    #output {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 32px 36px;
      line-height: 1.7;
      font-size: 1rem;
    }

    #output .book-entry { margin-bottom: 36px; }
    #output .book-entry:not(:last-child) {
      padding-bottom: 36px;
      border-bottom: 1px solid #e8e8e4;
    }

    #output h3 {
      font-size: 1.1rem;
      margin: 0 0 10px 0;
      font-weight: bold;
    }

    #output h3 a {
      color: #222;
      text-decoration: underline;
      text-underline-offset: 3px;
    }
    #output h3 a:hover { color: #555; }

    #output p {
      margin: 0;
      color: #333;
    }

    #output .no-desc {
      color: #999;
      font-style: italic;
    }

    #output .review {
      margin: 8px 0 0 0;
      color: #555;
      font-style: italic;
    }
  </style>
</head>
<body>

  <h1>Blog List Generator</h1>
  <p class="sub">Upload a CSV with Title/Author/Link columns. Description, reviewer name, and review text are optional.</p>

  <label class="upload">
    Choose CSV file
    <input type="file" id="csv-input" accept=".csv">
  </label>

  <div id="utm-section">
    <label class="utm-toggle">
      <input type="checkbox" id="utm-enabled"> Add UTM parameters
    </label>
    <div id="utm-fields">
      <input type="text" id="utm-campaign" placeholder="Campaign name">
      <span class="utm-preview">?utm_source=fable&amp;utm_placement=blog&amp;utm_campaign=<span id="utm-preview-name">…</span></span>
    </div>
  </div>

  <div id="status"></div>

  <div id="output-section">
    <div class="output-toolbar">
      <h2>Ready to paste into Contentful</h2>
      <div class="buttons">
        <button id="btn-copy">Copy all</button>
        <span id="copy-confirm">Copied!</span>
      </div>
    </div>
    <div id="output"></div>
  </div>

  <script>
    const ENTITIES = {
      '&amp;': '&', '&lt;': '<', '&gt;': '>', '&quot;': '"', '&apos;': "'",
      '&nbsp;': ' ', '&mdash;': '—', '&ndash;': '–', '&lsquo;': '\u2018',
      '&rsquo;': '\u2019', '&ldquo;': '\u201C', '&rdquo;': '\u201D',
      '&hellip;': '…', '&copy;': '©', '&reg;': '®', '&trade;': '™',
    };

    function cleanHtml(html) {
      if (!html || !html.trim()) return '';
      return html
        .replace(/<[^>]*>/g, ' ')
        .replace(/&#(\d+);/g, (_, n) => String.fromCharCode(Number(n)))
        .replace(/&[a-z]+;/gi, m => ENTITIES[m] ?? m)
        .replace(/\s+/g, ' ')
        .trim();
    }

    // Extract a short tagline from a long HTML description.
    // Strategy: collect text from all <b>/<strong> blocks, split into paragraphs,
    // then return the last paragraph that isn't a pull quote, all-caps line, or series note.
    function extractTagline(html) {
      if (!html || !html.trim()) return '';
      const boldRe = /<(?:b|strong)[^>]*>([\s\S]*?)<\/(?:b|strong)>/gi;
      const segments = [];
      let m;
      while ((m = boldRe.exec(html)) !== null) segments.push(m[1]);
      if (segments.length === 0) {
        // No bold text — use first sentence of cleaned full text
        const full = cleanHtml(html);
        const first = full.match(/^[^.!?]+[.!?]/);
        return first ? first[0].trim() : full.substring(0, 250).trim();
      }
      const combined = segments.join('<br><br>');
      const paras = combined.split(/<br\s*\/?>\s*(?:<br\s*\/?>)*/i)
        .map(p => cleanHtml(p).trim())
        .filter(p => p.length > 0);
      const quoteStarts = /^[\u201C\u201D\u2018\u2019\u00AB\u00BB"'«»\u2014\—]/;
      for (let i = paras.length - 1; i >= 0; i--) {
        const p = paras[i];
        if (p.length < 25) continue;
        if (quoteStarts.test(p)) continue;
        if (p === p.toUpperCase()) continue; // all-caps blurb header
        if (/^Book \w+ of /i.test(p)) continue; // series info
        return p;
      }
      return paras[paras.length - 1] || '';
    }

    function parseCSV(text) {
      const rows = [];
      let field = '', row = [], inQuotes = false;
      for (let i = 0; i < text.length; i++) {
        const ch = text[i];
        if (inQuotes) {
          if (ch === '"' && text[i + 1] === '"') { field += '"'; i++; }
          else if (ch === '"') inQuotes = false;
          else field += ch;
        } else {
          if (ch === '"') inQuotes = true;
          else if (ch === ',') { row.push(field); field = ''; }
          else if (ch === '\n') { row.push(field); rows.push(row); row = []; field = ''; }
          else if (ch !== '\r') field += ch;
        }
      }
      if (field || row.length) { row.push(field); rows.push(row); }

      // Detect headerless CSV: if any cell in the first row is a URL or very long, it's data.
      const firstRow = rows[0];
      const hasHeaders = firstRow && !firstRow.some(c => c.startsWith('http') || c.length > 100);
      let headers, dataRows;
      if (hasHeaders) {
        headers = firstRow;
        dataRows = rows.slice(1);
      } else {
        // Generate positional headers for the Everand catalog format:
        // Title, Author, ISBN, Link, Description, Reviewer, Review
        const positionalNames = ['Title', 'Author', 'ISBN', 'Link', 'Description', 'Reviewer', 'Review'];
        headers = Array.from({ length: firstRow.length }, (_, i) => positionalNames[i] || `col_${i}`);
        dataRows = rows;
      }

      return dataRows
        .filter(r => r.length >= headers.length - 1)
        .map(r => Object.fromEntries(headers.map((h, i) => [h.trim(), (r[i] || '').trim()])));
    }

    function buildLink(rawUrl) {
      const base = rawUrl.startsWith('http') ? rawUrl : 'https://' + rawUrl;
      const utmEnabled = document.getElementById('utm-enabled').checked;
      const campaign = document.getElementById('utm-campaign').value.trim();
      if (utmEnabled && campaign) {
        const sep = base.includes('?') ? '&' : '?';
        return (base + sep + 'utm_source=fable&utm_placement=blog&utm_campaign=' + encodeURIComponent(campaign)).replace(/"/g, '%22');
      }
      return base.replace(/"/g, '%22');
    }

    function findColumn(keys, candidates) {
      for (const c of candidates) {
        const match = keys.find(k => k.toLowerCase() === c.toLowerCase());
        if (match) return match;
      }
      for (const c of candidates) {
        const match = keys.find(k => k.toLowerCase().includes(c.toLowerCase()));
        if (match) return match;
      }
      return null;
    }

    function render(records) {
      if (records.length === 0) throw new Error('No records found in CSV.');
      const keys = Object.keys(records[0]);

      const titleCol = findColumn(keys, ['Title', 'doc_title', 'Book Title', 'Name']);
      if (!titleCol) throw new Error('Could not find a title column (e.g. Title, doc_title).');

      const authorCol = findColumn(keys, ['Author', 'Authors', 'authors', 'Author Name', 'Writer']);
      if (!authorCol) throw new Error('Could not find an author column (e.g. Author, authors).');

      const linkCol = findColumn(keys, ['Link', 'URL', 'Href', 'catalog_link', 'Everand_Link', 'Everand Link']);
      if (!linkCol) throw new Error('Could not find a link column (e.g. Link, URL, catalog_link).');

      const descCol = findColumn(keys, ['Description', 'Blurb', 'Summary', 'Notes', 'Text']);
      const reviewerCol = findColumn(keys, ['Reviewer', 'Reviewer Name', 'Reader', 'Reader Name', 'User']);
      const reviewCol = findColumn(keys, ['Review', 'Book Review', 'Book_Review', 'Review Text', 'User Review', 'Comment', 'Quote']);

      return records.map(row => {
        const rawDesc = descCol ? row[descCol] : '';
        // Use tagline extraction for long HTML descriptions; plain text passes through cleanHtml
        const blurb = rawDesc
          ? (rawDesc.includes('<') ? extractTagline(rawDesc) : cleanHtml(rawDesc))
          : '';
        const reviewer = reviewerCol ? row[reviewerCol].trim() : '';
        const reviewText = reviewCol ? row[reviewCol].trim() : '';

        const safeTitle = row[titleCol].replace(/"/g, '&quot;');
        const safeAuthor = row[authorCol].replace(/</g, '&lt;');
        const safeLink = buildLink(row[linkCol]);

        const esc = s => s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');

        const blurbHtml = blurb ? `\n  <p>${esc(blurb)}</p>` : '';
        const reviewHtml = reviewText
          ? (reviewer
              ? `\n  <p class="review">Fable reader ${esc(reviewer)} wrote: &ldquo;${esc(reviewText)}&rdquo;</p>`
              : `\n  <p class="review">&ldquo;${esc(reviewText)}&rdquo;</p>`)
          : '';

        return `<div class="book-entry">
  <h3><a href="${safeLink}" target="_blank">"${safeTitle}" by ${safeAuthor}</a></h3>${blurbHtml}${reviewHtml}
</div>`;
      }).join('\n');
    }

    document.getElementById('utm-enabled').addEventListener('change', function () {
      document.getElementById('utm-fields').classList.toggle('visible', this.checked);
    });

    document.getElementById('utm-campaign').addEventListener('input', function () {
      document.getElementById('utm-preview-name').textContent = this.value.trim() || '…';
    });

    document.getElementById('csv-input').addEventListener('change', function () {
      const file = this.files[0];
      if (!file) return;
      document.getElementById('status').textContent = `Reading ${file.name}…`;

      const reader = new FileReader();
      reader.onload = e => {
        try {
          const records = parseCSV(e.target.result);
          document.getElementById('output').innerHTML = render(records);
          document.getElementById('output-section').style.display = 'block';
          document.getElementById('status').textContent = `Done — ${records.length} books processed.`;
        } catch (err) {
          document.getElementById('status').textContent = `Error: ${err.message}`;
        }
      };
      reader.readAsText(file);
    });

    document.getElementById('btn-copy').addEventListener('click', () => {
      const el = document.getElementById('output');

      // Select the rendered content and use the browser's native copy
      // so that live hyperlinks survive the paste into Contentful
      const range = document.createRange();
      range.selectNodeContents(el);
      const sel = window.getSelection();
      sel.removeAllRanges();
      sel.addRange(range);
      document.execCommand('copy');
      sel.removeAllRanges();

      const confirm = document.getElementById('copy-confirm');
      confirm.style.display = 'inline';
      setTimeout(() => confirm.style.display = 'none', 2000);
    });
  </script>
</body>
</html>
